name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor-community/media
          npm install @capacitor/app

      - name: Create capacitor.config.json (if not exists)
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.rave.app",
            "appName": "RAVE",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "cleartext": true,
              "allowNavigation": ["*"]
            }
          }
          EOF
            echo "✅ capacitor.config.json created"
          else
            echo "✅ capacitor.config.json already exists"
          fi

      - name: Init Capacitor
        run: npx cap init RAVE com.rave.app --web-dir ./www

      - name: Create web directory and copy files
        run: |
          mkdir -p www
          cp index.html www/
          # Копируем все остальные файлы, но не перезаписываем index.html
          find . -maxdepth 1 -type f ! -name "index.html" -exec cp {} www/ \; 2>/dev/null || true
          # Копируем папки с ресурсами (если есть)
          cp -r assets www/ 2>/dev/null || true
          cp -r css www/ 2>/dev/null || true
          cp -r js www/ 2>/dev/null || true
          echo "✅ Web files copied"

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web files to Android
        run: npx cap copy

      - name: Sync Capacitor
        run: npx cap sync

      - name: Copy app icons
        run: |
          if [ -d "app-icons" ]; then
            echo "📱 Copying app icons..."
            cp -r app-icons/* android/app/src/main/res/
            ls -la android/app/src/main/res/
          else
            echo "⚠️ No app-icons folder found"
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
